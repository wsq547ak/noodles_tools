# Nginx configuration for Tiny Toolbox production deployment
#
# Assumptions:
# - Next.js standalone frontend runs on 127.0.0.1:4001
# - Python picZip compression service runs on 127.0.0.1:5001
# - Next.js is built with basePath: "/tools"
#
# All /tools/* requests are proxied to the Next.js frontend.
# /tools/api/* requests are proxied directly to the Python backend.

server {
    listen 80;
    server_name noodleservice.cloud;

    # Proxy all /tools/* requests to the Next.js standalone server.
    # The trailing slash strips the /tools/ prefix before forwarding.
    location /tools/ {
        proxy_pass http://127.0.0.1:4001/tools/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase body size for image uploads (default is 1M).
        client_max_body_size 20M;

        # WebSocket support (used by Next.js dev mode, optional in production).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: redirect root to /tools.
    location = / {
        return 302 /tools;
    }
}
